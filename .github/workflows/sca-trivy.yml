name: SCA & Container Scan (Trivy)

on:
  workflow_call:
    outputs:
      security_status:
        description: "Security result for this phase: passed|failed"
        value: ${{ jobs.trivy.outputs.security_status }}

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      security_status: ${{ steps.final_status.outputs.security_status }}
      job_status: ${{ steps.final_status.outputs.job_status }}
      artifact_url: ${{ steps.upload_trivy_reports.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare evidence directory
        run: |
          mkdir -p security/evidence/trivy
          mkdir -p .trivy-templates

      - name: Download Trivy HTML template
        run: |
          curl -L \
            -o .trivy-templates/html.tpl \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      - name: Trivy FS scan (JSON)
        id: trivy_fs_json
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ./api-auth
          format: json
          output: security/evidence/trivy/trivy-report.json
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Trivy FS scan (HTML)
        id: trivy_fs_html
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ./api-auth
          format: template
          template: "@.trivy-templates/html.tpl"
          output: security/evidence/trivy/trivy-report.html
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Build Docker image
        id: build_image
        if: ${{ hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          docker build -t api-auth:ci ./api-auth

      - name: Trivy image scan (JSON)
        id: trivy_image_json
        if: ${{ hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: api-auth:ci
          format: json
          output: security/evidence/trivy/trivy-image-report.json
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Trivy image scan (HTML)
        id: trivy_image_html
        if: ${{ hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: api-auth:ci
          format: template
          template: "@.trivy-templates/html.tpl"
          output: security/evidence/trivy/trivy-image-report.html
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Validate FS JSON report exists
        id: validate_fs_report
        if: always()
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/trivy-report.json
          test -s security/evidence/trivy/trivy-report.json

      - name: Validate FS HTML report exists and is not empty
        id: validate_fs_html
        if: always()
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/trivy-report.html
          test -s security/evidence/trivy/trivy-report.html

      - name: Evaluate HIGH/CRITICAL findings in FS scan
        id: fs_vuln_check
        if: always()
        continue-on-error: true
        run: |
          COUNT=$(jq '
            [
              .Results[]?
              | .Vulnerabilities[]?
              | select(.Severity == "HIGH" or .Severity == "CRITICAL")
            ] | length
          ' security/evidence/trivy/trivy-report.json)

          echo "high_critical_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Detected HIGH/CRITICAL findings in FS scan: $COUNT"

          test "$COUNT" -eq 0

      - name: Validate image JSON report exists
        id: validate_image_report
        if: ${{ always() && hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/trivy-image-report.json
          test -s security/evidence/trivy/trivy-image-report.json

      - name: Validate image HTML report exists and is not empty
        id: validate_image_html
        if: ${{ always() && hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/trivy-image-report.html
          test -s security/evidence/trivy/trivy-image-report.html

      - name: Evaluate HIGH/CRITICAL findings in image scan
        id: image_vuln_check
        if: ${{ always() && hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          COUNT=$(jq '
            [
              .Results[]?
              | .Vulnerabilities[]?
              | select(.Severity == "HIGH" or .Severity == "CRITICAL")
            ] | length
          ' security/evidence/trivy/trivy-image-report.json)

          echo "high_critical_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Detected HIGH/CRITICAL findings in image scan: $COUNT"

          test "$COUNT" -eq 0

      - name: Upload Trivy reports
        id: upload_trivy_reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-reports
          path: |
            security/evidence/trivy/trivy-report.html
            security/evidence/trivy/trivy-report.json
            security/evidence/trivy/trivy-image-report.html
            security/evidence/trivy/trivy-image-report.json

      - name: Consolidate Trivy result
        id: final_status
        if: always()
        run: |
          FS_JSON_OUTCOME="${{ steps.trivy_fs_json.outcome }}"
          FS_HTML_OUTCOME="${{ steps.trivy_fs_html.outcome }}"
          FS_JSON_REPORT_OUTCOME="${{ steps.validate_fs_report.outcome }}"
          FS_HTML_REPORT_OUTCOME="${{ steps.validate_fs_html.outcome }}"
          FS_VULN_OUTCOME="${{ steps.fs_vuln_check.outcome }}"
          FS_HIGH_CRITICAL_COUNT="${{ steps.fs_vuln_check.outputs.high_critical_count }}"

          if [ "${{ hashFiles('api-auth/Dockerfile') }}" != "" ]; then
            BUILD_IMAGE_OUTCOME="${{ steps.build_image.outcome }}"
            IMAGE_JSON_OUTCOME="${{ steps.trivy_image_json.outcome }}"
            IMAGE_HTML_OUTCOME="${{ steps.trivy_image_html.outcome }}"
            IMAGE_JSON_REPORT_OUTCOME="${{ steps.validate_image_report.outcome }}"
            IMAGE_HTML_REPORT_OUTCOME="${{ steps.validate_image_html.outcome }}"
            IMAGE_VULN_OUTCOME="${{ steps.image_vuln_check.outcome }}"
            IMAGE_HIGH_CRITICAL_COUNT="${{ steps.image_vuln_check.outputs.high_critical_count }}"
          else
            BUILD_IMAGE_OUTCOME="skipped"
            IMAGE_JSON_OUTCOME="skipped"
            IMAGE_HTML_OUTCOME="skipped"
            IMAGE_JSON_REPORT_OUTCOME="skipped"
            IMAGE_HTML_REPORT_OUTCOME="skipped"
            IMAGE_VULN_OUTCOME="skipped"
            IMAGE_HIGH_CRITICAL_COUNT="0"
          fi

          echo "fs_json_outcome=$FS_JSON_OUTCOME"
          echo "fs_html_outcome=$FS_HTML_OUTCOME"
          echo "fs_json_report_outcome=$FS_JSON_REPORT_OUTCOME"
          echo "fs_html_report_outcome=$FS_HTML_REPORT_OUTCOME"
          echo "fs_vuln_outcome=$FS_VULN_OUTCOME"
          echo "fs_high_critical_count=$FS_HIGH_CRITICAL_COUNT"
          echo "build_image_outcome=$BUILD_IMAGE_OUTCOME"
          echo "image_json_outcome=$IMAGE_JSON_OUTCOME"
          echo "image_html_outcome=$IMAGE_HTML_OUTCOME"
          echo "image_json_report_outcome=$IMAGE_JSON_REPORT_OUTCOME"
          echo "image_html_report_outcome=$IMAGE_HTML_REPORT_OUTCOME"
          echo "image_vuln_outcome=$IMAGE_VULN_OUTCOME"
          echo "image_high_critical_count=$IMAGE_HIGH_CRITICAL_COUNT"

          SECURITY_STATUS="passed"
          JOB_STATUS="success"

          if [ "$FS_JSON_OUTCOME" != "success" ] || [ "$FS_HTML_OUTCOME" != "success" ] || [ "$FS_JSON_REPORT_OUTCOME" != "success" ] || [ "$FS_HTML_REPORT_OUTCOME" != "success" ] || [ "$FS_VULN_OUTCOME" != "success" ] || [ "${FS_HIGH_CRITICAL_COUNT:-0}" -gt 0 ]; then
            SECURITY_STATUS="failed"
            JOB_STATUS="failure"
          fi

          if [ "${{ hashFiles('api-auth/Dockerfile') }}" != "" ]; then
            if [ "$BUILD_IMAGE_OUTCOME" != "success" ] || [ "$IMAGE_JSON_OUTCOME" != "success" ] || [ "$IMAGE_HTML_OUTCOME" != "success" ] || [ "$IMAGE_JSON_REPORT_OUTCOME" != "success" ] || [ "$IMAGE_HTML_REPORT_OUTCOME" != "success" ] || [ "$IMAGE_VULN_OUTCOME" != "success" ] || [ "${IMAGE_HIGH_CRITICAL_COUNT:-0}" -gt 0 ]; then
              SECURITY_STATUS="failed"
              JOB_STATUS="failure"
            fi
          fi

          echo "security_status=$SECURITY_STATUS" >> "$GITHUB_OUTPUT"
          echo "job_status=$JOB_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "## Trivy Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS JSON scan | ${{ steps.trivy_fs_json.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS HTML scan | ${{ steps.trivy_fs_html.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS JSON report | ${{ steps.validate_fs_report.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS HTML report | ${{ steps.validate_fs_html.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS HIGH/CRITICAL findings count | ${{ steps.fs_vuln_check.outputs.high_critical_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker image build | ${{ steps.build_image.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image JSON scan | ${{ steps.trivy_image_json.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image HTML scan | ${{ steps.trivy_image_html.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image JSON report | ${{ steps.validate_image_report.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image HTML report | ${{ steps.validate_image_html.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image HIGH/CRITICAL findings count | ${{ steps.image_vuln_check.outputs.high_critical_count || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consolidated Security Status | ${{ steps.final_status.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan path: api-auth/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reports artifact: ${{ steps.upload_trivy_reports.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"

  compose-slack-alert-on-fail:
    needs: [trivy]
    if: ${{ needs.trivy.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: slack_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ needs.trivy.outputs.artifact_url }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          PAYLOAD=$(jq -c -n \
            --arg repo "$REPO" \
            --arg ref "$REF_NAME" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT_NAME" \
            --arg run "$RUN_URL" \
            --arg artifact "$ARTIFACT_URL" \
            --arg prurl "$PR_URL" \
            --arg prnum "$PR_NUM" \
            --arg prtitle "$PR_TITLE" '
            {
              attachments: [
                {
                  color: "#D32F2F",
                  blocks: (
                    [
                      {type:"header", text:{type:"plain_text", text:"🚨 Trivy Analysis FAILED 🚨"}},
                      {type:"section", text:{type:"mrkdwn", text:("*Repo:* " + $repo)}},
                      {type:"section", text:{type:"mrkdwn", text:"*Scan path:* api-auth/"}},
                      {
                        type:"context",
                        elements: [
                          {type:"mrkdwn", text:("*Branch:* " + $ref)},
                          {type:"mrkdwn", text:("*Actor:* " + $actor)},
                          {type:"mrkdwn", text:("*Event:* " + $event)}
                        ]
                      },
                      {
                        type:"section",
                        text: {
                          type:"mrkdwn",
                          text:("*Run:* <" + $run + "|Open in GitHub Actions>\n*Reports artifact:* <" + $artifact + "|Download Trivy reports>")
                        }
                      }
                    ] +
                    (if ($prnum|length) > 0 then
                      [
                        {type:"section", text:{type:"mrkdwn", text:("*Pull Request:* <" + $prurl + "|PR #" + $prnum + " - " + $prtitle + ">")}},
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Check PR"}, url:$prurl},
                          {type:"button", text:{type:"plain_text", text:"Download Reports"}, url:$artifact},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    else
                      [
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Download Reports"}, url:$artifact},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    end)
                  )
                }
              ]
            }')

          PAYLOAD_B64=$(printf '%s' "$PAYLOAD" | base64 -w0)
          echo "slack_payload_b64=$PAYLOAD_B64" >> "$GITHUB_OUTPUT"
    outputs:
      slack_payload_b64: ${{ steps.slack_msg.outputs.slack_payload_b64 }}

  compose-email-alert-on-fail:
    needs: [trivy]
    if: ${{ needs.trivy.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build email HTML
        id: email_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ needs.trivy.outputs.artifact_url }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUM" ]; then
            PR_BLOCK="<p><b>Pull Request:</b> <a href=\"$PR_URL\">PR #$PR_NUM - $PR_TITLE</a></p>"
          else
            PR_BLOCK=""
          fi

          BODY=$(cat <<EOF
          <h2>🚨 Trivy Analysis FAILED 🚨</h2>

          <table border="0" cellpadding="5">
            <tr><td><b>Repo:</b></td><td>$REPO</td></tr>
            <tr><td><b>Branch:</b></td><td>$REF_NAME</td></tr>
            <tr><td><b>Actor:</b></td><td>$ACTOR</td></tr>
            <tr><td><b>Event:</b></td><td>$EVENT_NAME</td></tr>
            <tr><td><b>Scan path:</b></td><td>api-auth/</td></tr>
          </table>

          <p><b>Run:</b> <a href="$RUN_URL">Open execution in GitHub Actions</a></p>
          <p><b>Reports artifact:</b> <a href="$ARTIFACT_URL">Download Trivy reports</a></p>

          $PR_BLOCK

          <p>👉 The artifact contains filesystem and image reports in HTML and JSON formats.</p>
          EOF
          )

          BODY_B64=$(printf '%s' "$BODY" | base64 -w0)
          echo "email_body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
    outputs:
      email_body_b64: ${{ steps.email_msg.outputs.email_body_b64 }}

  alerts:
    needs: [compose-slack-alert-on-fail, compose-email-alert-on-fail]
    uses: ./.github/workflows/alerts-send.yml
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      status: failure
      only_if_failed: true
      send_slack: true
      slack_payload_b64: ${{ needs.compose-slack-alert-on-fail.outputs.slack_payload_b64 }}
      send_email: true
      email_subject: "[ALERT] Trivy analysis failed - ${{ github.repository }}"
      email_body_b64: ${{ needs.compose-email-alert-on-fail.outputs.email_body_b64 }}