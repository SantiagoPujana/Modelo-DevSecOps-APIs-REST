name: SCA & Container Scan (Trivy)

on:
  workflow_call:
    outputs:
      security_status:
        description: "Security result for this phase: passed|failed"
        value: ${{ jobs.trivy.outputs.security_status }}

jobs:
  trivy:
    runs-on: ubuntu-latest
    outputs:
      security_status: ${{ steps.final_status.outputs.security_status }}
      job_status: ${{ steps.final_status.outputs.job_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare evidence directory
        run: mkdir -p security/evidence/trivy

      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          cache: true

      - name: Trivy FS scan (api-auth)
        id: trivy_fs
        continue-on-error: true
        run: |
          trivy fs /github/workspace/api-auth \
            --format json \
            --output security/evidence/trivy/fs-report.json

      - name: Build Docker image
        id: build_image
        if: ${{ hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          docker build -t api-auth:ci ./api-auth

      - name: Trivy image scan
        id: trivy_image
        if: ${{ hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          trivy image api-auth:ci \
            --format json \
            --output security/evidence/trivy/image-report.json

      - name: Validate FS report exists
        id: validate_fs_report
        if: always()
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/fs-report.json

      - name: Evaluate HIGH/CRITICAL vulnerabilities in FS scan
        id: fs_vuln_check
        if: always()
        continue-on-error: true
        run: |
          jq -e '
            [
              .Results[]?
              | .Vulnerabilities[]?
              | select(.Severity == "HIGH" or .Severity == "CRITICAL")
            ] | length == 0
          ' security/evidence/trivy/fs-report.json

      - name: Validate image report exists
        id: validate_image_report
        if: ${{ always() && hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          test -f security/evidence/trivy/image-report.json

      - name: Evaluate HIGH/CRITICAL vulnerabilities in image scan
        id: image_vuln_check
        if: ${{ always() && hashFiles('api-auth/Dockerfile') != '' }}
        continue-on-error: true
        run: |
          jq -e '
            [
              .Results[]?
              | .Vulnerabilities[]?
              | select(.Severity == "HIGH" or .Severity == "CRITICAL")
            ] | length == 0
          ' security/evidence/trivy/image-report.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            security/evidence/trivy/*.json

      - name: Consolidate Trivy result
        id: final_status
        if: always()
        run: |
          FS_SCAN_OUTCOME="${{ steps.trivy_fs.outcome }}"
          FS_REPORT_OUTCOME="${{ steps.validate_fs_report.outcome }}"
          FS_VULN_OUTCOME="${{ steps.fs_vuln_check.outcome }}"

          if [ "${{ hashFiles('api-auth/Dockerfile') }}" != "" ]; then
            BUILD_IMAGE_OUTCOME="${{ steps.build_image.outcome }}"
            IMAGE_SCAN_OUTCOME="${{ steps.trivy_image.outcome }}"
            IMAGE_REPORT_OUTCOME="${{ steps.validate_image_report.outcome }}"
            IMAGE_VULN_OUTCOME="${{ steps.image_vuln_check.outcome }}"
          else
            BUILD_IMAGE_OUTCOME="skipped"
            IMAGE_SCAN_OUTCOME="skipped"
            IMAGE_REPORT_OUTCOME="skipped"
            IMAGE_VULN_OUTCOME="skipped"
          fi

          echo "fs_scan_outcome=$FS_SCAN_OUTCOME"
          echo "fs_report_outcome=$FS_REPORT_OUTCOME"
          echo "fs_vuln_outcome=$FS_VULN_OUTCOME"
          echo "build_image_outcome=$BUILD_IMAGE_OUTCOME"
          echo "image_scan_outcome=$IMAGE_SCAN_OUTCOME"
          echo "image_report_outcome=$IMAGE_REPORT_OUTCOME"
          echo "image_vuln_outcome=$IMAGE_VULN_OUTCOME"

          SECURITY_STATUS="passed"
          JOB_STATUS="success"

          if [ "$FS_SCAN_OUTCOME" != "success" ] || [ "$FS_REPORT_OUTCOME" != "success" ] || [ "$FS_VULN_OUTCOME" != "success" ]; then
            SECURITY_STATUS="failed"
            JOB_STATUS="failure"
          fi

          if [ "${{ hashFiles('api-auth/Dockerfile') }}" != "" ]; then
            if [ "$BUILD_IMAGE_OUTCOME" != "success" ] || [ "$IMAGE_SCAN_OUTCOME" != "success" ] || [ "$IMAGE_REPORT_OUTCOME" != "success" ] || [ "$IMAGE_VULN_OUTCOME" != "success" ]; then
              SECURITY_STATUS="failed"
              JOB_STATUS="failure"
            fi
          fi

          echo "security_status=$SECURITY_STATUS" >> "$GITHUB_OUTPUT"
          echo "job_status=$JOB_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "## Trivy Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS scan | ${{ steps.trivy_fs.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS report generation | ${{ steps.validate_fs_report.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FS HIGH/CRITICAL check | ${{ steps.fs_vuln_check.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker image build | ${{ steps.build_image.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image scan | ${{ steps.trivy_image.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image report generation | ${{ steps.validate_image_report.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image HIGH/CRITICAL check | ${{ steps.image_vuln_check.outcome || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consolidated Security Status | ${{ steps.final_status.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan path: api-auth/" >> "$GITHUB_STEP_SUMMARY"

  compose-slack-alert-on-fail:
    needs: [trivy]
    if: ${{ needs.trivy.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: slack_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          PAYLOAD=$(jq -c -n \
            --arg repo "$REPO" \
            --arg ref "$REF_NAME" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT_NAME" \
            --arg run "$RUN_URL" \
            --arg prurl "$PR_URL" \
            --arg prnum "$PR_NUM" \
            --arg prtitle "$PR_TITLE" '
            {
              attachments: [
                {
                  color: "#D32F2F",
                  blocks: (
                    [
                      {type:"header", text:{type:"plain_text", text:"🚨 Trivy Analysis FAILED 🚨"}},
                      {type:"section", text:{type:"mrkdwn", text:("*Repo:* " + $repo)}},
                      {type:"section", text:{type:"mrkdwn", text:"*Scan path:* api-auth/"}},
                      {
                        type:"context",
                        elements: [
                          {type:"mrkdwn", text:("*Branch:* " + $ref)},
                          {type:"mrkdwn", text:("*Actor:* " + $actor)},
                          {type:"mrkdwn", text:("*Event:* " + $event)}
                        ]
                      },
                      {
                        type:"section",
                        text: {
                          type:"mrkdwn",
                          text:("*Run:* <" + $run + "|Open in GitHub Actions>")
                        }
                      }
                    ] +
                    (if ($prnum|length) > 0 then
                      [
                        {type:"section", text:{type:"mrkdwn", text:("*Pull Request:* <" + $prurl + "|PR #" + $prnum + " - " + $prtitle + ">")}},
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Check PR"}, url:$prurl},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    else [] end)
                  )
                }
              ]
            }')

          PAYLOAD_B64=$(printf '%s' "$PAYLOAD" | base64 -w0)
          echo "slack_payload_b64=$PAYLOAD_B64" >> "$GITHUB_OUTPUT"
    outputs:
      slack_payload_b64: ${{ steps.slack_msg.outputs.slack_payload_b64 }}

  compose-email-alert-on-fail:
    needs: [trivy]
    if: ${{ needs.trivy.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build email HTML
        id: email_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUM" ]; then
            PR_BLOCK="<p><b>Pull Request:</b> <a href=\"$PR_URL\">PR #$PR_NUM - $PR_TITLE</a></p>"
          else
            PR_BLOCK=""
          fi

          BODY=$(cat <<EOF
          <h2>🚨 Trivy Analysis FAILED 🚨</h2>

          <table border="0" cellpadding="5">
            <tr><td><b>Repo:</b></td><td>$REPO</td></tr>
            <tr><td><b>Branch:</b></td><td>$REF_NAME</td></tr>
            <tr><td><b>Actor:</b></td><td>$ACTOR</td></tr>
            <tr><td><b>Event:</b></td><td>$EVENT_NAME</td></tr>
            <tr><td><b>Scan path:</b></td><td>api-auth/</td></tr>
          </table>

          <p><b>Run:</b> <a href="$RUN_URL">Open execution in GitHub Actions</a></p>

          $PR_BLOCK

          <p>👉 Review the Trivy artifacts for HIGH/CRITICAL findings in filesystem and container image scans.</p>
          EOF
          )

          BODY_B64=$(printf '%s' "$BODY" | base64 -w0)
          echo "email_body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
    outputs:
      email_body_b64: ${{ steps.email_msg.outputs.email_body_b64 }}

  alerts:
    needs: [trivy, compose-slack-alert-on-fail, compose-email-alert-on-fail]
    if: ${{ needs.trivy.outputs.security_status == 'failed' }}
    uses: ./.github/workflows/alerts-send.yml
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      status: failure
      only_if_failed: true
      send_slack: true
      slack_payload_b64: ${{ needs.compose-slack-alert-on-fail.outputs.slack_payload_b64 }}
      send_email: true
      email_subject: "[ALERT] Trivy analysis failed - ${{ github.repository }}"
      email_body_b64: ${{ needs.compose-email-alert-on-fail.outputs.email_body_b64 }}