name: Security Pipeline Master

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  phase-1-sast:
    name: Phase 1 - SAST
    uses: ./.github/workflows/sast-sonarqube.yml
    secrets: inherit

  phase-2-1-sca-trivy:
    name: Phase 2.1 - SCA / Trivy
    needs: phase-1-sast
    uses: ./.github/workflows/sca-trivy.yml
    secrets: inherit

  phase-2-2-sca-odc:
    name: Phase 2.2 - SCA / OWASP Dependency-Check
    needs: phase-1-sast
    uses: ./.github/workflows/dependency-check.yml
    secrets: inherit

  phase-3-dast:
    name: Phase 3 - DAST / ZAP
    needs:
      - phase-2-1-sca-trivy
      - phase-2-2-sca-odc
    uses: ./.github/workflows/zap-baseline.yml
    secrets: inherit

  phase-4-security-gate:
    name: Phase 4 - Security Gate
    runs-on: ubuntu-latest
    needs:
      - phase-1-sast
      - phase-2-1-sca-trivy
      - phase-2-2-sca-odc
      - phase-3-dast
    if: always()
    steps:
      - name: Consolidate phase results
        id: consolidate
        run: |
          SAST_STATUS="${{ needs.phase-1-sast.outputs.security_status }}"
          TRIVY_STATUS="${{ needs.phase-2-1-sca-trivy.outputs.security_status }}"
          ODC_STATUS="${{ needs.phase-2-2-sca-odc.outputs.security_status }}"
          ZAP_STATUS="${{ needs.phase-3-dast.outputs.security_status }}"

          echo "SAST_STATUS=$SAST_STATUS"
          echo "TRIVY_STATUS=$TRIVY_STATUS"
          echo "ODC_STATUS=$ODC_STATUS"
          echo "ZAP_STATUS=$ZAP_STATUS"

          FINAL_STATUS="passed"

          if [ "$SAST_STATUS" != "passed" ] || [ "$TRIVY_STATUS" != "passed" ] || [ "$ODC_STATUS" != "passed" ] || [ "$ZAP_STATUS" != "passed" ]; then
            FINAL_STATUS="failed"
          fi

          echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write pipeline summary
        run: |
          echo "## Security Pipeline Master Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 1 - SAST | ${{ needs.phase-1-sast.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 2.1 - SCA / Trivy | ${{ needs.phase-2-1-sca-trivy.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 2.2 - SCA / OWASP Dependency-Check | ${{ needs.phase-2-2-sca-odc.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 3 - DAST / ZAP | ${{ needs.phase-3-dast.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Final Gate | ${{ steps.consolidate.outputs.final_status }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline if gate failed
        run: |
          if [ "${{ steps.consolidate.outputs.final_status }}" != "passed" ]; then
            echo "Security gate failed"
            exit 1
          fi