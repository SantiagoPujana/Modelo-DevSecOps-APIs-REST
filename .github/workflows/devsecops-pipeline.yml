name: DevSecOps Pipeline Main Workflow

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  phase-1-sast:
    name: Phase 1 - SAST / sast
    uses: ./.github/workflows/sast-sonarqube.yml
    secrets: inherit

  phase-2-1-sca-trivy:
    name: Phase 2.1 - SCA / trivy
    needs: phase-1-sast
    uses: ./.github/workflows/sca-trivy.yml
    secrets: inherit

  phase-2-2-sca-odc:
    name: Phase 2.2 - SCA / dependency-check
    needs: phase-1-sast
    uses: ./.github/workflows/dependency-check.yml
    secrets: inherit

  phase-3-dast:
    name: Phase 3 - DAST / zap
    needs:
      - phase-2-1-sca-trivy
      - phase-2-2-sca-odc
    uses: ./.github/workflows/zap-baseline.yml
    secrets: inherit

  phase-4-security-gate:
    name: Phase 4 - Security Gate
    needs: phase-3-dast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate upstream phases
        run: |
          echo "Phase 1 (SAST): validated upstream through phase sequencing"
          echo "Phase 2 (SCA - Trivy + ODC): validated upstream through phase sequencing"
          echo "Phase 3 (DAST): ${{ needs.phase-3-dast.result }}"

          if [ "${{ needs.phase-3-dast.result }}" != "success" ]; then
            echo "Security gate failed"
            exit 1
          fi

      - name: Write pipeline summary
        run: |
          echo "## Security Pipeline Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 1 - SAST | Completed before Phase 2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 2 - SCA | Completed before Phase 3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 3 - DAST | ${{ needs.phase-3-dast.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 4 - Security Gate | Executed |" >> "$GITHUB_STEP_SUMMARY"