name: DAST (OWASP ZAP Scan)

on:
  workflow_call:
    outputs:
      security_status:
        description: "Security result for this phase: passed|failed"
        value: ${{ jobs.zap.outputs.security_status }}

jobs:
  zap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      security_status: ${{ steps.final_status.outputs.security_status }}
      job_status: ${{ steps.final_status.outputs.job_status }}
      artifact_url: ${{ steps.upload_zap_reports.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug repository files
        run: |
          pwd
          ls -la
          ls -la api-auth

      - name: Prepare evidence directory
        run: |
          mkdir -p security/evidence/zap
          chmod 777 security/evidence/zap

      - name: Start application stack
        id: start_stack
        continue-on-error: true
        run: |
          docker compose -f api-auth/docker-compose.yml up -d --build

      - name: Wait for application
        id: wait_app
        continue-on-error: true
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/openapi.json >/dev/null 2>&1; then
              echo "Application is up"
              exit 0
            fi
            echo "Waiting for application..."
            sleep 10
          done
          echo "Application did not become ready in time"
          exit 1

      - name: Warm up API routes
        id: warmup_routes
        if: always()
        continue-on-error: true
        run: |
          curl -fsS http://localhost:8000/docs >/dev/null || true
          curl -fsS http://localhost:8000/openapi.json >/dev/null || true
          curl -fsS "http://localhost:8000/user?username=admin" >/dev/null || true
          curl -fsS "http://localhost:8000/read?path=../../etc/hosts" >/dev/null || true
          curl -fsS "http://localhost:8000/exec?host=127.0.0.1" >/dev/null || true
          curl -fsS "http://localhost:8000/hash?password=test123" >/dev/null || true
          curl -ksS "http://localhost:8000/fetch?url=https://example.com" >/dev/null || true

      - name: Generate ZAP Automation Framework plan
        id: generate_plan
        if: always()
        continue-on-error: true
        run: |
          cat > security/evidence/zap/zap.yaml <<'EOF'
          env:
            contexts:
              - name: "Default Context"
                urls:
                  - "http://localhost:8000/docs"
                includePaths:
                  - "http://localhost:8000.*"
            parameters:
              failOnError: false
              failOnWarning: false
              progressToStdout: true

          jobs:
            - type: openapi
              parameters:
                apiUrl: "http://localhost:8000/openapi.json"
                targetUrl: "http://localhost:8000"

            - type: spider
              parameters:
                context: "Default Context"
                url: "http://localhost:8000/docs"
                maxDuration: 5
                maxDepth: 10

            - type: passiveScan-wait
              parameters:
                maxDuration: 10

            - type: activeScan
              parameters:
                context: "Default Context"
                policy: "Default Policy"
                defaultStrength: "High"
                defaultThreshold: "Low"
                maxRuleDurationInMins: 3
                maxScanDurationInMins: 15
                addQueryParam: true
                threadPerHost: 4

            - type: passiveScan-wait
              parameters:
                maxDuration: 10

            - type: report
              parameters:
                template: "traditional-html"
                reportDir: "/zap/wrk"
                reportFile: "zap-report.html"

            - type: report
              parameters:
                template: "traditional-json"
                reportDir: "/zap/wrk"
                reportFile: "zap-report.json"
          EOF

      - name: Run ZAP Automation Framework scan
        id: zap_scan
        if: always()
        continue-on-error: true
        run: |
          docker run --rm \
            --user root \
            --network host \
            -v "$(pwd)/security/evidence/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap.yaml

      - name: Validate ZAP reports
        id: validate_reports
        if: always()
        continue-on-error: true
        run: |
          test -f security/evidence/zap/zap-report.json
          test -s security/evidence/zap/zap-report.json
          test -f security/evidence/zap/zap-report.html
          test -s security/evidence/zap/zap-report.html

      - name: Evaluate ZAP alerts
        id: zap_eval
        if: always()
        continue-on-error: true
        run: |
          MEDIUM_HIGH_COUNT=$(jq '[.site[]?.alerts[]? | select((.riskcode|tonumber) >= 2)] | length' security/evidence/zap/zap-report.json)
          LOW_COUNT=$(jq '[.site[]?.alerts[]? | select((.riskcode|tonumber) == 1)] | length' security/evidence/zap/zap-report.json)
          INFO_COUNT=$(jq '[.site[]?.alerts[]? | select((.riskcode|tonumber) == 0)] | length' security/evidence/zap/zap-report.json)

          echo "high_medium_count=$MEDIUM_HIGH_COUNT" >> "$GITHUB_OUTPUT"
          echo "low_count=$LOW_COUNT" >> "$GITHUB_OUTPUT"
          echo "info_count=$INFO_COUNT" >> "$GITHUB_OUTPUT"

          echo "Detected Medium/High ZAP alerts: $MEDIUM_HIGH_COUNT"
          echo "Detected Low ZAP alerts: $LOW_COUNT"
          echo "Detected Info ZAP alerts: $INFO_COUNT"

          test "$MEDIUM_HIGH_COUNT" -eq 0

      - name: Upload ZAP reports
        id: upload_zap_reports
        if: ${{ steps.zap_eval.outputs.high_medium_count != '0' }}
        uses: actions/upload-artifact@v6
        with:
          name: zap-reports
          path: |
            security/evidence/zap/zap-report.html
            security/evidence/zap/zap-report.json
            security/evidence/zap/zap.yaml

      - name: Consolidate ZAP result
        id: final_status
        if: always()
        run: |
          START_STACK_OUTCOME="${{ steps.start_stack.outcome }}"
          WAIT_APP_OUTCOME="${{ steps.wait_app.outcome }}"
          WARMUP_OUTCOME="${{ steps.warmup_routes.outcome }}"
          PLAN_OUTCOME="${{ steps.generate_plan.outcome }}"
          ZAP_SCAN_OUTCOME="${{ steps.zap_scan.outcome }}"
          REPORT_OUTCOME="${{ steps.validate_reports.outcome }}"
          ZAP_EVAL_OUTCOME="${{ steps.zap_eval.outcome }}"
          ALERT_COUNT="${{ steps.zap_eval.outputs.high_medium_count }}"

          echo "start_stack_outcome=$START_STACK_OUTCOME"
          echo "wait_app_outcome=$WAIT_APP_OUTCOME"
          echo "warmup_outcome=$WARMUP_OUTCOME"
          echo "plan_outcome=$PLAN_OUTCOME"
          echo "zap_scan_outcome=$ZAP_SCAN_OUTCOME"
          echo "report_outcome=$REPORT_OUTCOME"
          echo "zap_eval_outcome=$ZAP_EVAL_OUTCOME"
          echo "alert_count=$ALERT_COUNT"

          SECURITY_STATUS="passed"
          JOB_STATUS="success"

          if [ "$START_STACK_OUTCOME" != "success" ] || [ "$WAIT_APP_OUTCOME" != "success" ] || [ "$PLAN_OUTCOME" != "success" ] || [ "$ZAP_SCAN_OUTCOME" != "success" ] || [ "$REPORT_OUTCOME" != "success" ] || [ "$ZAP_EVAL_OUTCOME" != "success" ] || [ "${ALERT_COUNT:-0}" -gt 0 ]; then
            SECURITY_STATUS="failed"
            JOB_STATUS="failure"
          fi

          echo "security_status=$SECURITY_STATUS" >> "$GITHUB_OUTPUT"
          echo "job_status=$JOB_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "## ZAP Automation Framework Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Start stack | ${{ steps.start_stack.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Wait app | ${{ steps.wait_app.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Warmup routes | ${{ steps.warmup_routes.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Generate AF plan | ${{ steps.generate_plan.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ZAP scan | ${{ steps.zap_scan.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reports validation | ${{ steps.validate_reports.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Medium/High findings count | ${{ steps.zap_eval.outputs.high_medium_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Low findings count | ${{ steps.zap_eval.outputs.low_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Informational findings count | ${{ steps.zap_eval.outputs.info_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consolidated Security Status | ${{ steps.final_status.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: http://localhost:8000/openapi.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reports artifact: ${{ steps.upload_zap_reports.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop application stack
        if: always()
        run: |
          docker compose -f api-auth/docker-compose.yml down -v

  compose-slack-alert-on-fail:
    needs: [zap]
    if: ${{ needs.zap.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: slack_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ needs.zap.outputs.artifact_url }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          PAYLOAD=$(jq -c -n \
            --arg repo "$REPO" \
            --arg ref "$REF_NAME" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT_NAME" \
            --arg run "$RUN_URL" \
            --arg artifact "$ARTIFACT_URL" \
            --arg prurl "$PR_URL" \
            --arg prnum "$PR_NUM" \
            --arg prtitle "$PR_TITLE" '
            {
              attachments: [
                {
                  color: "#D32F2F",
                  blocks: (
                    [
                      {type:"header", text:{type:"plain_text", text:"🚨 ZAP Scan FAILED 🚨"}},
                      {type:"section", text:{type:"mrkdwn", text:("*Repo:* " + $repo)}},
                      {type:"section", text:{type:"mrkdwn", text:"*Target:* http://localhost:8000/openapi.json"}},
                      {
                        type:"context",
                        elements: [
                          {type:"mrkdwn", text:("*Branch:* " + $ref)},
                          {type:"mrkdwn", text:("*Actor:* " + $actor)},
                          {type:"mrkdwn", text:("*Event:* " + $event)}
                        ]
                      },
                      {
                        type:"section",
                        text: {
                          type:"mrkdwn",
                          text:("*Run:* <" + $run + "|Open in GitHub Actions>\n*Reports artifact:* <" + $artifact + "|Download ZAP reports>")
                        }
                      }
                    ] +
                    (if ($prnum|length) > 0 then
                      [
                        {type:"section", text:{type:"mrkdwn", text:("*Pull Request:* <" + $prurl + "|PR #" + $prnum + " - " + $prtitle + ">")}},
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Check PR"}, url:$prurl},
                          {type:"button", text:{type:"plain_text", text:"Download Reports"}, url:$artifact},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    else
                      [
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Download Reports"}, url:$artifact},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    end)
                  )
                }
              ]
            }')

          PAYLOAD_B64=$(printf '%s' "$PAYLOAD" | base64 -w0)
          echo "slack_payload_b64=$PAYLOAD_B64" >> "$GITHUB_OUTPUT"
    outputs:
      slack_payload_b64: ${{ steps.slack_msg.outputs.slack_payload_b64 }}

  compose-email-alert-on-fail:
    needs: [zap]
    if: ${{ needs.zap.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build email HTML
        id: email_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ needs.zap.outputs.artifact_url }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUM" ]; then
            PR_BLOCK="<p><b>Pull Request:</b> <a href=\"$PR_URL\">PR #$PR_NUM - $PR_TITLE</a></p>"
          else
            PR_BLOCK=""
          fi

          BODY=$(cat <<EOF
          <h2>🚨 ZAP Scan FAILED 🚨</h2>

          <table border="0" cellpadding="5">
            <tr><td><b>Repo:</b></td><td>$REPO</td></tr>
            <tr><td><b>Branch:</b></td><td>$REF_NAME</td></tr>
            <tr><td><b>Actor:</b></td><td>$ACTOR</td></tr>
            <tr><td><b>Event:</b></td><td>$EVENT_NAME</td></tr>
            <tr><td><b>Target:</b></td><td>http://localhost:8000/openapi.json</td></tr>
          </table>

          <p><b>Run:</b> <a href="$RUN_URL">Open execution in GitHub Actions</a></p>
          <p><b>Reports artifact:</b> <a href="$ARTIFACT_URL">Download ZAP reports</a></p>

          $PR_BLOCK

          <p>👉 The artifact contains the ZAP HTML and JSON reports.</p>
          EOF
          )

          BODY_B64=$(printf '%s' "$BODY" | base64 -w0)
          echo "email_body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
    outputs:
      email_body_b64: ${{ steps.email_msg.outputs.email_body_b64 }}

  alerts:
    needs: [compose-slack-alert-on-fail, compose-email-alert-on-fail]
    uses: ./.github/workflows/alerts-send.yml
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      status: failure
      only_if_failed: true
      send_slack: true
      slack_payload_b64: ${{ needs.compose-slack-alert-on-fail.outputs.slack_payload_b64 }}
      send_email: true
      email_subject: "[ALERT] ZAP scan failed - ${{ github.repository }}"
      email_body_b64: ${{ needs.compose-email-alert-on-fail.outputs.email_body_b64 }}