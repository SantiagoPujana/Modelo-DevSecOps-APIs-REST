name: SAST (SonarCloud - Python)

on:
  workflow_call:
    outputs:
      security_status:
        description: "Security result for this phase: passed|failed"
        value: ${{ jobs.sast.outputs.security_status }}

jobs:
  sast:
    runs-on: ubuntu-latest
    outputs:
      security_status: ${{ steps.final_status.outputs.security_status }}
      job_status: ${{ steps.final_status.outputs.job_status }}
      qg_status: ${{ steps.final_status.outputs.qg_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api-auth/requirements.txt', 'api-auth/test/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        id: install_deps
        run: |
          if [ -f api-auth/test/requirements.txt ]; then pip install -r api-auth/test/requirements.txt; fi
          if [ -f api-auth/requirements.txt ]; then pip install -r api-auth/requirements.txt; fi

      - name: Run tests with coverage (pytest-cov)
        id: tests
        working-directory: api-auth
        continue-on-error: true
        run: |
          export PYTHONPATH=${PWD}
          pytest --maxfail=1 -q --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: api-auth/coverage.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: SonarCloud Scan (Pull Request)
        id: sonar_scan_pr
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}

      - name: SonarCloud Scan (Branch)
        id: sonar_scan_branch
        if: ${{ github.event_name != 'pull_request' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: SonarCloud Quality Gate
        id: qg
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Consolidate SAST result
        id: final_status
        if: always()
        run: |
          TESTS_OUTCOME="${{ steps.tests.outcome }}"
          SONAR_SCAN_PR_OUTCOME="${{ steps.sonar_scan_pr.outcome }}"
          SONAR_SCAN_BRANCH_OUTCOME="${{ steps.sonar_scan_branch.outcome }}"
          QG_STATUS="${{ steps.qg.outputs.quality-gate-status }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SONAR_SCAN_OUTCOME="$SONAR_SCAN_PR_OUTCOME"
          else
            SONAR_SCAN_OUTCOME="$SONAR_SCAN_BRANCH_OUTCOME"
          fi

          echo "tests_outcome=$TESTS_OUTCOME"
          echo "sonar_scan_pr_outcome=$SONAR_SCAN_PR_OUTCOME"
          echo "sonar_scan_branch_outcome=$SONAR_SCAN_BRANCH_OUTCOME"
          echo "sonar_scan_selected_outcome=$SONAR_SCAN_OUTCOME"
          echo "qg_status=$QG_STATUS"

          SECURITY_STATUS="passed"
          JOB_STATUS="success"

          if [ "$TESTS_OUTCOME" != "success" ] || [ "$SONAR_SCAN_OUTCOME" != "success" ] || [ "$QG_STATUS" = "FAILED" ] || [ -z "$QG_STATUS" ]; then
            SECURITY_STATUS="failed"
            JOB_STATUS="failure"
          fi

          echo "security_status=$SECURITY_STATUS" >> "$GITHUB_OUTPUT"
          echo "job_status=$JOB_STATUS" >> "$GITHUB_OUTPUT"
          echo "qg_status=$QG_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "## SAST Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests + Coverage | ${{ steps.tests.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SonarCloud Scan (PR) | ${{ steps.sonar_scan_pr.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SonarCloud Scan (Branch) | ${{ steps.sonar_scan_branch.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quality Gate | ${{ steps.qg.outputs.quality-gate-status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consolidated Security Status | ${{ steps.final_status.outputs.security_status }} |" >> "$GITHUB_STEP_SUMMARY"

  compose-slack-alert-on-fail:
    needs: [sast]
    if: ${{ needs.sast.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: slack_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          PAYLOAD=$(jq -c -n \
            --arg repo "$REPO" \
            --arg ref "$REF_NAME" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT_NAME" \
            --arg run "$RUN_URL" \
            --arg prurl "$PR_URL" \
            --arg prnum "$PR_NUM" \
            --arg prtitle "$PR_TITLE" '
            {
              attachments: [
                {
                  color: "#D32F2F",
                  blocks: (
                    [
                      {type:"header", text:{type:"plain_text", text:"🚨 SAST Analysis FAILED 🚨"}},
                      {type:"section", text:{type:"mrkdwn", text:("*Repo:* " + $repo)}},
                      {
                        type:"context",
                        elements: [
                          {type:"mrkdwn", text:("*Branch:* " + $ref)},
                          {type:"mrkdwn", text:("*Actor:* " + $actor)},
                          {type:"mrkdwn", text:("*Event:* " + $event)}
                        ]
                      },
                      {
                        type:"section",
                        text: {
                          type:"mrkdwn",
                          text:("*Run:* <" + $run + "|Open in GitHub Actions>\n*SonarCloud [Project]:* <https://sonarcloud.io/project/overview?id=SONAR_PROJECT_KEY|Open>")
                        }
                      }
                    ] +
                    (if ($prnum|length) > 0 then
                      [
                        {type:"section", text:{type:"mrkdwn", text:("*Pull Request:* <" + $prurl + "|PR #" + $prnum + " - " + $prtitle + ">")}},
                        {type:"actions", elements:[
                          {type:"button", text:{type:"plain_text", text:"Check PR"}, url:$prurl},
                          {type:"button", text:{type:"plain_text", text:"SonarCloud (PR)"}, url:("https://sonarcloud.io/dashboard?id=SONAR_PROJECT_KEY&pullRequest=" + $prnum)},
                          {type:"button", text:{type:"plain_text", text:"GitHub Actions"}, url:$run}
                        ]}
                      ]
                    else [] end)
                  )
                }
              ]
            }')

          PAYLOAD_B64=$(printf '%s' "$PAYLOAD" | base64 -w0)
          echo "slack_payload_b64=$PAYLOAD_B64" >> "$GITHUB_OUTPUT"
    outputs:
      slack_payload_b64: ${{ steps.slack_msg.outputs.slack_payload_b64 }}

  compose-email-alert-on-fail:
    needs: [sast]
    if: ${{ needs.sast.outputs.security_status == 'failed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build email HTML
        id: email_msg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
          PR_NUM: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUM" ]; then
            PR_BLOCK="<p><b>Pull Request:</b>
              <a href=\"$PR_URL\">PR #$PR_NUM - $PR_TITLE</a></p>
              <p><b>SonarCloud [Project]:</b> <a href=\"https://sonarcloud.io/project/overview?id=SONAR_PROJECT_KEY\">Overview</a></p>
              <p><b>SonarCloud (PR):</b> <a href=\"https://sonarcloud.io/dashboard?id=SONAR_PROJECT_KEY&pullRequest=$PR_NUM\">Check PR on SonarCloud</a></p>"
          else
            PR_BLOCK="<p><b>SonarCloud [Project]:</b> <a href=\"https://sonarcloud.io/project/overview?id=SONAR_PROJECT_KEY\">Overview</a></p>"
          fi

          BODY=$(cat <<EOF
          <h2>🚨 SAST Analysis FAILED 🚨</h2>

          <table border="0" cellpadding="5">
            <tr><td><b>Repo:</b></td><td>$REPO</td></tr>
            <tr><td><b>Branch:</b></td><td>$REF_NAME</td></tr>
            <tr><td><b>Actor:</b></td><td>$ACTOR</td></tr>
            <tr><td><b>Event:</b></td><td>$EVENT_NAME</td></tr>
          </table>

          <p><b>Run:</b> <a href="$RUN_URL">Open execution in GitHub Actions</a></p>

          $PR_BLOCK

          <p>👉 Please check Issues, Vulnerabilities and Hotspots on SonarCloud.</p>
          EOF
          )

          BODY_B64=$(printf '%s' "$BODY" | base64 -w0)
          echo "email_body_b64=$BODY_B64" >> "$GITHUB_OUTPUT"
    outputs:
      email_body_b64: ${{ steps.email_msg.outputs.email_body_b64 }}

  alerts:
    needs: [sast, compose-slack-alert-on-fail, compose-email-alert-on-fail]
    if: ${{ needs.sast.outputs.security_status == 'failed' }}
    uses: ./.github/workflows/alerts-send.yml
    secrets:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      status: failure
      only_if_failed: true
      send_slack: true
      slack_payload_b64: ${{ needs.compose-slack-alert-on-fail.outputs.slack_payload_b64 }}
      send_email: true
      email_subject: "[ALERT] SAST Analysis failed - ${{ github.repository }}"
      email_body_b64: ${{ needs.compose-email-alert-on-fail.outputs.email_body_b64 }}