name: Alerts Sender

on:
  workflow_call:
    inputs:
      status:
        description: "Job result: success|failure|cancelled|timed_out"
        required: true
        type: string
      only_if_failed:
        description: "Only Send if failed"
        required: false
        type: boolean
        default: true
      send_slack:
        required: false
        type: boolean
        default: true
      slack_payload_b64:
        description: "Base64 Slack Payload JSON Formatted already"
        required: false
        type: string
        default: ""
      send_email:
        required: false
        type: boolean
        default: true
      email_subject:
        required: false
        type: string
        default: ""
      email_body_b64:
        description: "Base64 Email Html Body Formatted already"
        required: false
        type: string
        default: ""
    secrets:
      SONAR_PROJECT_KEY:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      MAIL_TO:
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Gate (skip if success and only_if_failed=true)
        id: gate
        run: |
          if [ "${{ inputs.only_if_failed }}" = "true" ] && [ "${{ inputs.status }}" = "success" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Slack - send
        id: b64_json
        if: ${{ steps.gate.outputs.skip == 'false' && inputs.send_slack && inputs.slack_payload_b64 != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          printf '%s' '${{ inputs.slack_payload_b64 }}' | base64 --decode > payload.json

          SAFE=$(printf '%s' "$SONAR_PROJECT_KEY" | sed -e 's/[&|/\\]/\\&/g')
          sed -i "s|SONAR_PROJECT_KEY|$SAFE|g" payload.json

          curl -sS -X POST -H 'Content-type: application/json' --data @payload.json "$SLACK_WEBHOOK_URL"

      - name: Materialize email body (b64 → file)
        id: b64_body
        run: |
          printf '%s' '${{ inputs.email_body_b64 }}' | base64 --decode > email.html

          SAFE=$(printf '%s' "$SONAR_PROJECT_KEY" | sed -e 's/[&|/\\]/\\&/g')
          sed -i "s|SONAR_PROJECT_KEY|$SAFE|g" email.html

      - name: Email - send
        if: ${{ steps.gate.outputs.skip == 'false' && inputs.send_email && inputs.email_subject != '' && inputs.email_body_b64 != '' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ inputs.email_subject }}
          to: ${{ secrets.MAIL_TO }}
          from: "DevSecOps Bot ${{ secrets.SMTP_USERNAME }}"
          html_body: file://email.html
          # Optional unsigned/invalid certificates allowance:
          #ignore_cert: true
          # Optional carbon copy recipients:
          #cc: email@example.com,email@example.com
          # Optional blind carbon copy recipients:
          #bcc: email@example.com,email@example.com

      - name: Debug inputs
        run: |
          echo "status=${{ inputs.status }}"
          echo "only_if_failed=${{ inputs.only_if_failed }}"
          echo "send_slack=${{ inputs.send_slack }}"
          echo "send_email=${{ inputs.send_email }}"
          echo "slack_payload_len=$(echo -n '${{ inputs.slack_payload_b64 }}' | wc -c)"
          echo "email_subject_empty=$([ -z '${{ inputs.email_subject }}' ] && echo yes || echo no)"
          echo "email_body_len=$(echo -n '${{ inputs.email_body_b64 }}' | wc -c)"